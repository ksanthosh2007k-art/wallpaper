<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖼️ Ultimate Wallpaper Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.5s ease;
            position: relative;
        }

        /* Particle Background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: floatParticle 15s infinite;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header with Float Animation */
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 30px 20px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Theme Switcher */
        .theme-switcher {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .theme-switcher button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .theme-switcher button:hover {
            transform: scale(1.2);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* Upload Section with Pulse Animation */
        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            text-align: center;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .upload-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 10px;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1em;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Search & Sort */
        .search-sort {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-sort input,
        .search-sort select {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: box-shadow 0.3s;
        }

        .search-sort input:focus,
        .search-sort select:focus {
            outline: none;
            box-shadow: 0 5px 25px rgba(0,0,0,0.4);
        }

        .search-sort input {
            width: 300px;
        }

        /* Layout Controls */
        .layout-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .layout-controls .btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }

        .layout-controls .btn:hover,
        .layout-controls .btn.active {
            background: white;
            color: #667eea;
        }

        /* Category Filter */
        .category-filter {
            margin-bottom: 30px;
            text-align: center;
        }

        .category-btn {
            padding: 10px 20px;
            margin: 5px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-btn:hover,
        .category-btn.active {
            background: white;
            color: #667eea;
            transform: scale(1.05);
        }

        /* Gallery Grid with Stagger Animation */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .gallery.layout-masonry {
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        }

        .gallery.layout-compact {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery.layout-spread {
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 40px;
        }

        .wallpaper-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.5s, box-shadow 0.5s;
            position: relative;
            animation: fadeInUp 0.6s ease-out backwards;
            cursor: pointer;
        }

        .wallpaper-item:nth-child(1) { animation-delay: 0.1s; }
        .wallpaper-item:nth-child(2) { animation-delay: 0.2s; }
        .wallpaper-item:nth-child(3) { animation-delay: 0.3s; }
        .wallpaper-item:nth-child(4) { animation-delay: 0.4s; }
        .wallpaper-item:nth-child(5) { animation-delay: 0.5s; }
        .wallpaper-item:nth-child(6) { animation-delay: 0.6s; }
        .wallpaper-item:nth-child(7) { animation-delay: 0.7s; }
        .wallpaper-item:nth-child(8) { animation-delay: 0.8s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wallpaper-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .wallpaper-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, filter 0.3s;
        }

        .wallpaper-item:hover img {
            transform: scale(1.1);
        }

        /* Shimmer Effect */
        .wallpaper-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
            z-index: 1;
            pointer-events: none;
        }

        .wallpaper-item:hover::before {
            left: 100%;
        }

        /* Image Filter Effects */
        .wallpaper-item.filter-grayscale img {
            filter: grayscale(100%);
        }

        .wallpaper-item.filter-grayscale:hover img {
            filter: grayscale(0%);
        }

        .wallpaper-item.filter-sepia img {
            filter: sepia(100%);
        }

        .wallpaper-item.filter-sepia:hover img {
            filter: sepia(0%);
        }

        .wallpaper-info {
            padding: 15px;
        }

        .wallpaper-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .wallpaper-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Buttons with Ripple Effect */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .btn:active::after {
            width: 200px;
            height: 200px;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-set {
            background: #27ae60;
            color: white;
        }

        .btn-set:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
            grid-column: 1 / -1;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .preview-container {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.3s;
        }

        .preview-container img {
            max-width: 300px;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: none;
            animation: slideIn 0.3s ease-out;
            z-index: 3000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
            animation: modalFadeIn 0.3s;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 40px;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .lightbox-close:hover {
            transform: rotate(90deg);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 20px 15px;
            font-size: 30px;
            cursor: pointer;
            transition: background 0.3s;
            border-radius: 10px;
        }

        .lightbox-nav:hover {
            background: rgba(255,255,255,0.4);
        }

        .lightbox-nav.prev { left: 20px; }
        .lightbox-nav.next { right: 20px; }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Filter Controls */
        .filter-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-controls .btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }

        .filter-controls .btn:hover,
        .filter-controls .btn.active {
            background: white;
            color: #667eea;
        }

        /* Stats Bar */
        .stats-bar {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            color: white;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
            padding: 10px 20px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }

            .search-sort {
                flex-direction: column;
                align-items: center;
            }

            .search-sort input {
                width: 100%;
                max-width: 300px;
            }

            .lightbox-nav {
                padding: 10px 8px;
                font-size: 20px;
            }
        }

        /* Color Themes */
        body.theme-purple {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.theme-blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        body.theme-green {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        body.theme-orange {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        body.theme-dark {
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
        }

        body.theme-sunset {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body.theme-ocean {
            background: linear-gradient(135deg, #5ee7df 0%, #b490ca 100%);
        }
    </style>
</head>
<body class="theme-purple">
    <!-- Particle Background -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <header>
            <h1>🖼️ Ultimate Wallpaper Gallery</h1>
            <p>Upload, manage, and customize your favorite wallpapers</p>
            
            <!-- Theme Switcher -->
            <div class="theme-switcher">
                <button onclick="changeTheme('theme-purple')" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" title="Purple"></button>
                <button onclick="changeTheme('theme-blue')" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);" title="Blue"></button>
                <button onclick="changeTheme('theme-green')" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);" title="Green"></button>
                <button onclick="changeTheme('theme-orange')" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);" title="Orange"></button>
                <button onclick="changeTheme('theme-dark')" style="background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);" title="Dark"></button>
                <button onclick="changeTheme('theme-sunset')" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" title="Sunset"></button>
                <button onclick="changeTheme('theme-ocean')" style="background: linear-gradient(135deg, #5ee7df 0%, #b490ca 100%);" title="Ocean"></button>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalWallpapers">0</div>
                <div class="stat-label">Total Wallpapers</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalSize">0 MB</div>
                <div class="stat-label">Storage Used</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="lastUpload">-</div>
                <div class="stat-label">Last Upload</div>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <h2>📤 Upload New Wallpaper</h2>
            <div class="file-input-wrapper">
                <input type="file" id="imageInput" accept="image/*" multiple>
                <label for="imageInput" class="file-input-label">📁 Choose Images</label>
            </div>
            <p style="margin-top: 15px; color: #666;">or drag & drop images here</p>
            <div class="preview-container" id="previewContainer">
                <p>Preview:</p>
                <img id="preview" alt="Preview">
            </div>
        </div>

        <!-- Search & Sort -->
        <div class="search-sort">
            <input type="text" id="searchInput" placeholder="🔍 Search wallpapers..." oninput="searchWallpapers()">
            <select id="sortSelect" onchange="sortWallpapers()">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="name">Name A-Z</option>
                <option value="name-desc">Name Z-A</option>
            </select>
        </div>

        <!-- Layout Controls -->
        <div class="layout-controls">
            <button class="btn active" onclick="changeLayout('layout-masonry', this)">📐 Masonry</button>
            <button class="btn" onclick="changeLayout('layout-compact', this)">📦 Compact</button>
            <button class="btn" onclick="changeLayout('layout-spread', this)">🖼️ Spread</button>
        </div>

        <!-- Filter Controls -->
        <div class="filter-controls">
            <button class="btn active" onclick="changeFilter('none', this)">✨ Normal</button>
            <button class="btn" onclick="changeFilter('filter-grayscale', this)">⚫ Grayscale</button>
            <button class="btn" onclick="changeFilter('filter-sepia', this)">📜 Sepia</button>
        </div>

        <!-- Category Filter -->
        <div class="category-filter">
            <button class="category-btn active" onclick="filterWallpapers('all', this)">All</button>
            <button class="category-btn" onclick="filterWallpapers('nature', this)">🌿 Nature</button>
            <button class="category-btn" onclick="filterWallpapers('abstract', this)">🎨 Abstract</button>
            <button class="category-btn" onclick="filterWallpapers('minimal', this)">⬜ Minimal</button>
            <button class="category-btn" onclick="filterWallpapers('space', this)">🚀 Space</button>
            <button class="category-btn" onclick="filterWallpapers('city', this)">🏙️ City</button>
        </div>

        <!-- Gallery -->
        <div class="gallery layout-masonry" id="gallery">
            <div class="empty-state">
                <h2>🎉 No wallpapers yet</h2>
                <p>Upload your first wallpaper above!</p>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
        <img id="lightboxImg" src="" alt="Full size">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <button class="lightbox-nav prev" onclick="changeImage(-1)">❮</button>
        <button class="lightbox-nav next" onclick="changeImage(1)">❯</button>
    </div>

    <script>
        // Initialize
        let wallpapers = JSON.parse(localStorage.getItem('wallpapers')) || [];
        let currentFilter = 'all';
        let currentLayout = localStorage.getItem('currentLayout') || 'layout-masonry';
        let currentTheme = localStorage.getItem('currentTheme') || 'theme-purple';
        let currentImageFilter = 'none';
        let currentImageIndex = 0;

        // Create Particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.width = (Math.random() * 10 + 5) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // Load Saved Settings
        function loadSettings() {
            document.body.className = currentTheme;
            document.getElementById('gallery').className = 'gallery ' + currentLayout;
            
            // Update layout buttons
            document.querySelectorAll('.layout-controls .btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(currentLayout.replace('layout-', '').charAt(0).toUpperCase() + currentLayout.replace('layout-', '').slice(1))) {
                    btn.classList.add('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            loadSettings();
            renderGallery();
            updateStats();
        });

        // File Input Handler
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const files = e.target.files;
            const previewContainer = document.getElementById('previewContainer');
            const preview = document.getElementById('preview');

            if (files.length > 0) {
                Array.from(files).forEach((file, index) => {
                    const reader = new FileReader();

                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        previewContainer.style.display = 'block';

                        const wallpaper = {
                            id: Date.now() + index,
                            src: e.target.result,
                            name: file.name,
                            category: currentFilter === 'all' ? 'nature' : currentFilter,
                            date: new Date().toLocaleDateString(),
                            size: (file.size / 1024 / 1024).toFixed(2) + ' MB'
                        };

                        wallpapers.push(wallpaper);
                        saveWallpapers();
                        renderGallery();
                        updateStats();
                        showNotification('✅ Wallpaper uploaded successfully!');
                        
                        previewContainer.style.display = 'none';
                    };

                    reader.readAsDataURL(file);
                });

                document.getElementById('imageInput').value = '';
            }
        });

        // Render Gallery
        function renderGallery() {
            const gallery = document.getElementById('gallery');
            
            if (wallpapers.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-state">
                        <h2>🎉 No wallpapers yet</h2>
                        <p>Upload your first wallpaper above!</p>
                    </div>
                `;
                return;
            }

            const filtered = currentFilter === 'all' 
                ? wallpapers 
                : wallpapers.filter(w => w.category === currentFilter);

            gallery.innerHTML = filtered.map((wallpaper, index) => `
                <div class="wallpaper-item ${currentImageFilter !== 'none' ? currentImageFilter : ''}" 
                     onclick="openLightbox(${wallpapers.indexOf(wallpaper)})">
                    <img src="${wallpaper.src}" alt="${wallpaper.name}" loading="lazy">
                    <div class="wallpaper-info">
                        <h3>${wallpaper.name}</h3>
                        <p style="color: #666; font-size: 0.85em; margin-bottom: 10px;">
                            📅 ${wallpaper.date} | 📁 ${wallpaper.category}
                        </p>
                        <div class="wallpaper-actions">
                            <button class="btn btn-download" onclick="event.stopPropagation(); downloadWallpaper('${wallpaper.src}', '${wallpaper.name}')">
                                ⬇ Download
                            </button>
                            <button class="btn btn-set" onclick="event.stopPropagation(); setWallpaper('${wallpaper.src}')">
                                🖥 Set
                            </button>
                            <button class="btn btn-delete" onclick="event.stopPropagation(); deleteWallpaper(${wallpaper.id})">
                                🗑 Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Download Wallpaper
        function downloadWallpaper(src, name) {
            const link = document.createElement('a');
            link.href = src;
            link.download = name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification('⬇ Download started!');
        }

        // Set Wallpaper (Fullscreen)
        function setWallpaper(src) {
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head><title>Wallpaper</title></head>
                <body style="margin:0; padding:0; height:100vh; display:flex; align-items:center; justify-content:center; background:#000;">
                    <img src="${src}" style="max-width:100%; max-height:100vh; object-fit:contain;">
                    <script>
                        document.addEventListener('keydown', function(e) {
                            if (e.key === 'F11') {
                                if (!document.fullscreenElement) {
                                    document.documentElement.requestFullscreen();
                                } else {
                                    document.exitFullscreen();
                                }
                            }
                        });
                    <\/script>
                </body>
                </html>
            `);
            showNotification('🖥 Press F11 for fullscreen');
        }

        // Delete Wallpaper
        function deleteWallpaper(id) {
            if (confirm('🗑 Are you sure you want to delete this wallpaper?')) {
                wallpapers = wallpapers.filter(w => w.id !== id);
                saveWallpapers();
                renderGallery();
                updateStats();
                showNotification('🗑 Wallpaper deleted!');
            }
        }

        // Filter Wallpapers
        function filterWallpapers(category, btn) {
            currentFilter = category;
            
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            
            renderGallery();
            showNotification(`📁 Filtered: ${category === 'all' ? 'All' : category}`);
        }

        // Change Layout
        function changeLayout(layout, btn) {
            currentLayout = layout;
            const gallery = document.getElementById('gallery');
            gallery.className = 'gallery ' + layout;
            localStorage.setItem('currentLayout', layout);
            
            document.querySelectorAll('.layout-controls .btn').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            
            showNotification('📐 Layout changed!');
        }

        // Change Filter
        function changeFilter(filter, btn) {
            currentImageFilter = filter;
            
            document.querySelectorAll('.filter-controls .btn').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            
            renderGallery();
            showNotification('✨ Filter applied!');
        }

        // Search Wallpapers
        function searchWallpapers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.wallpaper-item');
            
            items.forEach(item => {
                const name = item.querySelector('h3').textContent.toLowerCase();
                item.style.display = name.includes(searchTerm) ? 'block' : 'none';
            });
        }

        // Sort Wallpapers
        function sortWallpapers() {
            const sortType = document.getElementById('sortSelect').value;
            
            switch(sortType) {
                case 'newest':
                    wallpapers.sort((a, b) => b.id - a.id);
                    break;
                case 'oldest':
                    wallpapers.sort((a, b) => a.id - b.id);
                    break;
                case 'name':
                    wallpapers.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'name-desc':
                    wallpapers.sort((a, b) => b.name.localeCompare(a.name));
                    break;
            }
            
            renderGallery();
            saveWallpapers();
            showNotification('🔃 Sorted!');
        }

        // Change Theme
        function changeTheme(themeName) {
            document.body.className = themeName;
            currentTheme = themeName;
            localStorage.setItem('currentTheme', themeName);
            showNotification('🎨 Theme changed!');
        }

        // Lightbox Functions
        function openLightbox(index) {
            currentImageIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = wallpapers[index].src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function handleLightboxClick(event) {
            if (event.target.id === 'lightbox') {
                closeLightbox();
            }
        }

        function changeImage(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = wallpapers.length - 1;
            if (currentImageIndex >= wallpapers.length) currentImageIndex = 0;
            document.getElementById('lightboxImg').src = wallpapers[currentImageIndex].src;
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'ArrowRight') changeImage(1);
            }
        });

        // Save Wallpapers
        function saveWallpapers() {
            try {
                localStorage.setItem('wallpapers', JSON.stringify(wallpapers));
            } catch (e) {
                showNotification('⚠️ Storage limit reached!');
            }
        }

        // Update Stats
        function updateStats() {
            document.getElementById('totalWallpapers').textContent = wallpapers.length;
            
            const totalSize = wallpapers.reduce((acc, w) => {
                const size = parseFloat(w.size) || 0;
                return acc + size;
            }, 0);
            document.getElementById('totalSize').textContent = totalSize.toFixed(2) + ' MB';
            
            if (wallpapers.length > 0) {
                const lastDate = new Date(wallpapers[wallpapers.length - 1].id);
                document.getElementById('lastUpload').textContent = lastDate.toLocaleDateString();
            }
        }

        // Notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Drag and Drop Support
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.querySelector('.upload-section').style.transform = 'scale(1.02)';
            document.querySelector('.upload-section').style.boxShadow = '0 15px 40px rgba(0,0,0,0.4)';
        });

        document.addEventListener('dragleave', (e) => {
            document.querySelector('.upload-section').style.transform = 'scale(1)';
            document.querySelector('.upload-section').style.boxShadow = '0 10px 30px rgba(0,0,0,0.3)';
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            document.querySelector('.upload-section').style.transform = 'scale(1)';
            document.querySelector('.upload-section').style.boxShadow = '0 10px 30px rgba(0,0,0,0.3)';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const input = document.getElementById('imageInput');
                input.files = files;
                input.dispatchEvent(new Event('change'));
                showNotification('📤 Files dropped!');
            }
        });

        // Clear All Button (Optional)
        function clearAllWallpapers() {
            if (confirm('⚠️ Are you sure you want to delete ALL wallpapers? This cannot be undone!')) {
                wallpapers = [];
                saveWallpapers();
                renderGallery();
                updateStats();
                showNotification('🗑 All wallpapers cleared!');
            }
        }
    </script>
</body>
</html>
